---
services:
  ultra_tracker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ultra_tracker:latest
    logging:
      driver: none
    container_name: ultra-tracker
    ports:
      - '8080:8080'
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./race_config.yml:/app/race_config.yml:ro,z

  postgres:
    image: docker.io/library/postgres:18
    container_name: ultra-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_RO_USER: ${POSTGRES_RO_USER}
      POSTGRES_RO_PASSWORD: ${POSTGRES_RO_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./postgres_init:/docker-entrypoint-initdb.d:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: ultra-tracker-grafana
    ports:
      - 3000:3000
    volumes:
      - ./grafana_init:/etc/grafana/provisioning/:ro,z
      - grafana-data:/var/lib/grafana
    user: '1000'
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: true
      GF_DASHBOARDS_JSON_ENABLED: true
      GF_EXPLORE_ENABLED: false
      GF_FEATURE_TOGGLES_DASHGPT: false
      GF_FEATURE_TOGGLES_FEATUREHIGHLIGHTS: false
      GF_FEATURE_TOGGLES_SHARINGDASHBOARDIMAGE: false
      GF_INSTALL_PLUGINS: grafana-clock-panel
      GF_PANELS_DISABLE_SANITIZE_HTML: true
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USERNAME}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_USERS_DEFAULT_THEME: dark
      GF_CHECK_FOR_UPDATES: false
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PASSWORD: ${POSTGRES_RO_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_RO_USER}

volumes:
  postgres-data:
  grafana-data:
