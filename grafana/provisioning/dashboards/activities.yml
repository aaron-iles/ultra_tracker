apiVersion: 1
providers:
  - name: 'Running Dashboards'
    orgId: 1
    folder: 'Running'              # Grafana folder name (created if missing)
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards
